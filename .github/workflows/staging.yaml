# Proyecto único (reversa-datamirai): este workflow ES el deploy a Agent
# Engine en cada push a main. El workflow de prod queda solo como
# workflow_dispatch manual (mismo proyecto, SA de prod).
name: Deploy to Agent Engine

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'data_ingestion/**'
      - 'tests/**'
      - 'deployment/**'
      - 'uv.lock'

jobs:
  deploy_and_test_staging:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ secrets.WIF_POOL_ID }}/providers/${{ secrets.WIF_PROVIDER_ID }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
          create_credentials_file: true
          project_id: ${{ vars.CICD_PROJECT_ID }}

      - name: Install uv and dependencies
        run: |
          pip install uv==0.8.13
          uv sync --locked

      - name: Extract version from pyproject.toml
        id: extract-version
        run: |
          VERSION=$(awk -F'"' '/^version = / {print $2}' pyproject.toml || echo '0.0.0')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Extracted version: ${VERSION}"

      - name: Deploy to Staging (Agent Engine)
        run: |
          uv export --no-hashes --no-sources --no-header --no-dev --no-emit-project --no-annotate --locked > app/app_utils/.requirements.txt
          uv run python -m app.app_utils.deploy \
            --project ${{ vars.STAGING_PROJECT_ID }} \
            --location ${{ vars.REGION }} \
            --source-packages=./app \
            --entrypoint-module=app.agent_engine_app \
            --entrypoint-object=agent_engine \
            --requirements-file=app/app_utils/.requirements.txt \
            --service-account=${{ vars.APP_SERVICE_ACCOUNT_STAGING }} \
            --set-env-vars="COMMIT_SHA=${{ github.sha }},AGENT_VERSION=${{ steps.extract-version.outputs.version }},LOGS_BUCKET_NAME=${{ vars.LOGS_BUCKET_NAME_STAGING }}"

      - name: Run load test
        run: |
          # Token obtenido en el MISMO step que lo usa (no viaja por step outputs).
          export _AUTH_TOKEN=$(gcloud auth print-access-token -q)
          pip install locust==2.31.1
          # Gate E2E de UN caso: el pipeline (4 agentes + RAG) tarda 1-3 min
          # por caso; -t es solo el tope duro. El locustfile corre un caso y
          # termina (runner.quit), exigiendo expediente final.
          locust -f tests/load_test/load_test.py \
          --headless \
          -t 300s -u 1 -r 1 \
          --csv=tests/load_test/.results/results \
          --html=tests/load_test/.results/report.html

      - name: Export Load Test Results to GCS
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          gcloud storage cp --recursive tests/load_test/.results gs://${{ vars.LOGS_BUCKET_NAME_STAGING }}/load-test-results/results-${TIMESTAMP} --quiet
          echo "_________________________________________________________________________"
          echo "Load test results copied to gs://${{ vars.LOGS_BUCKET_NAME_STAGING }}/load-test-results/results-${TIMESTAMP}"
          echo "HTTP link: https://console.cloud.google.com/storage/browser/${{ vars.LOGS_BUCKET_NAME_STAGING }}/load-test-results/results-${TIMESTAMP}"
          echo "_________________________________________________________________________"
